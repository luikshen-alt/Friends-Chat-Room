<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>聊天大厅 - 朋友聊天室</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h3>聊天大厅</h3>
      <span class="user-info" id="userInfo"></span>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="messageInput" placeholder="输入消息..." maxlength="500" autocomplete="off">
      <button onclick="sendMessage()">发送</button>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('chatUser'));
    if (!user) {
      window.location.href = 'index.html';
    }

    document.getElementById('userInfo').textContent = user.nickname;

    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    let ws = null;
    let reconnectInterval = null;

    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => {
        console.log('WebSocket 已连接');
        if (reconnectInterval) {
          clearInterval(reconnectInterval);
          reconnectInterval = null;
        }
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'chat') {
          appendMessage(msg);
        }
      };

      ws.onclose = () => {
        console.log('WebSocket 已断开，尝试重连...');
        if (!reconnectInterval) {
          reconnectInterval = setInterval(connect, 3000);
        }
      };

      ws.onerror = (err) => {
        console.error('WebSocket 错误:', err);
      };
    }

    function loadHistory() {
      fetch('/api/messages')
        .then(res => res.json())
        .then(data => {
          if (data.success && data.messages) {
            chatMessages.innerHTML = '';
            data.messages.forEach(msg => appendMessage(msg));
          }
        });
    }

    function appendMessage(msg) {
      const isOwn = msg.username === user.username;
      const div = document.createElement('div');
      div.className = `message ${isOwn ? 'own' : 'other'}`;

      const time = msg.created_at
        ? new Date(msg.created_at).toLocaleString('zh-CN', {
            month: 'numeric',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          })
        : '';

      div.innerHTML = `
        <div class="message-sender">${msg.nickname}</div>
        <div class="message-bubble">${escapeHtml(msg.content)}</div>
        <div class="message-time">${time}</div>
      `;

      chatMessages.appendChild(div);
      scrollToBottom();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function scrollToBottom() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function sendMessage() {
      const content = messageInput.value.trim();
      if (!content) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert('连接已断开，请刷新页面重试');
        return;
      }

      ws.send(JSON.stringify({
        type: 'chat',
        username: user.username,
        nickname: user.nickname,
        content: content
      }));

      messageInput.value = '';
    }

    messageInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    function logout() {
      localStorage.removeItem('chatUser');
      if (ws) ws.close();
      window.location.href = 'index.html';
    }

    connect();
    loadHistory();
  </script>
</body>
</html>
