# ===== Docker Compose 编排 =====
# 企业实践：docker-compose 一键启动应用 + 数据库 + 缓存等所有依赖
# 面试话术：
#   "用 docker-compose 编排，开发和生产环境配置统一，
#    新人 clone 代码后一条 docker-compose up 就能跑起来，消除'我机器上能跑'的问题。"

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-chat-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # 持久化数据库文件（容器重启不丢失）
      - chat-data:/app/data
      # 持久化上传文件
      - upload-data:/app/public/uploads
    restart: unless-stopped
    # 资源限制（防止单个容器吃光服务器资源）
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    # 健康检查
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  chat-data:
    driver: local
  upload-data:
    driver: local
