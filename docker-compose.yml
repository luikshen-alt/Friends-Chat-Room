services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-app
    ports:
      - "3000:3000"
    volumes:
      - ./.env:/app/.env:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      # 使用 ngrok 等 HTTPS 域名时，在 .env 中设置 COOKIE_SECURE=true
